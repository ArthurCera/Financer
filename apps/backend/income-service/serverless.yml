service: financer-income-service

frameworkVersion: '3'

provider:
  name: aws
  runtime: nodejs20.x
  region: ${opt:region, 'us-east-1'}
  stage: ${opt:stage, 'local'}
  environment:
    POSTGRES_HOST: ${env:POSTGRES_HOST, 'localhost'}
    POSTGRES_PORT: ${env:POSTGRES_PORT, '5432'}
    POSTGRES_DB: ${env:POSTGRES_DB, 'financer'}
    POSTGRES_USER: ${env:POSTGRES_USER, 'financer'}
    POSTGRES_PASSWORD: ${env:POSTGRES_PASSWORD, 'financer_local'}
    REDIS_HOST: ${env:REDIS_HOST, 'localhost'}
    REDIS_PORT: ${env:REDIS_PORT, '6379'}
    JWT_SECRET: ${env:JWT_SECRET, 'dev_secret'}

plugins:
  - serverless-plugin-typescript
  - serverless-offline

custom:
  serverless-offline:
    httpPort: 3004
    noPrependStageInUrl: true

functions:
  health:
    handler: src/handlers/handler.health
    events:
      - http: { method: GET, path: /health }

  listIncome:
    handler: src/handlers/handler.listIncome
    events:
      - http: { method: GET, path: /income }

  createIncome:
    handler: src/handlers/handler.createIncome
    events:
      - http: { method: POST, path: /income }

  updateIncome:
    handler: src/handlers/handler.updateIncome
    events:
      - http:
          method: PUT
          path: /income/{id}

  deleteIncome:
    handler: src/handlers/handler.deleteIncome
    events:
      - http:
          method: DELETE
          path: /income/{id}
