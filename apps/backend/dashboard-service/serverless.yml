service: financer-dashboard-service

frameworkVersion: '3'

provider:
  name: aws
  runtime: nodejs20.x
  region: ${opt:region, 'us-east-1'}
  stage: ${opt:stage, 'local'}
  environment:
    POSTGRES_HOST: ${env:POSTGRES_HOST, 'localhost'}
    POSTGRES_PORT: ${env:POSTGRES_PORT, '5432'}
    POSTGRES_DB: ${env:POSTGRES_DB, 'financer'}
    POSTGRES_USER: ${env:POSTGRES_USER, 'financer'}
    POSTGRES_PASSWORD: ${env:POSTGRES_PASSWORD, 'financer_local'}
    REDIS_HOST: ${env:REDIS_HOST, 'localhost'}
    REDIS_PORT: ${env:REDIS_PORT, '6379'}
    JWT_SECRET: ${env:JWT_SECRET, 'dev_secret'}

plugins:
  - serverless-plugin-typescript
  - serverless-offline

custom:
  serverless-offline:
    httpPort: 3005
    lambdaPort: 0
    noPrependStageInUrl: true

functions:
  health:
    handler: src/handlers/handler.health
    events:
      - http:
          method: GET
          path: /health
          cors: true

  getDashboard:
    handler: src/handlers/handler.getDashboard
    events:
      - http:
          method: GET
          path: /dashboard
          cors: true

  getAdminUsers:
    handler: src/handlers/handler.getAdminUsers
    events:
      - http:
          method: GET
          path: /admin/users
          cors: true

  getAdminStats:
    handler: src/handlers/handler.getAdminStats
    events:
      - http:
          method: GET
          path: /admin/stats
          cors: true

  getAdminLLMUsage:
    handler: src/handlers/handler.getAdminLLMUsage
    events:
      - http:
          method: GET
          path: /admin/llm-usage
          cors: true

  getAdminLLMStats:
    handler: src/handlers/handler.getAdminLLMStats
    events:
      - http:
          method: GET
          path: /admin/llm-stats
          cors: true

  updateUserRole:
    handler: src/handlers/handler.updateUserRole
    events:
      - http:
          method: PUT
          path: /admin/users/{id}
          cors: true

  getAdminPeriodTotals:
    handler: src/handlers/handler.getAdminPeriodTotals
    events:
      - http:
          method: GET
          path: /admin/period-totals
          cors: true

  getAdminExpensesByCategory:
    handler: src/handlers/handler.getAdminExpensesByCategory
    events:
      - http:
          method: GET
          path: /admin/expenses-by-category
          cors: true

  getAdminCategoryCounts:
    handler: src/handlers/handler.getAdminCategoryCounts
    events:
      - http:
          method: GET
          path: /admin/category-counts
          cors: true

  getSubAccountDetail:
    handler: src/handlers/handler.getSubAccountDetail
    events:
      - http:
          method: GET
          path: /admin/sub-accounts/{id}/detail
          cors: true

  getSubAccounts:
    handler: src/handlers/handler.getSubAccounts
    events:
      - http:
          method: GET
          path: /admin/sub-accounts
          cors: true

  createSubAccount:
    handler: src/handlers/handler.createSubAccount
    events:
      - http:
          method: POST
          path: /admin/sub-accounts
          cors: true
