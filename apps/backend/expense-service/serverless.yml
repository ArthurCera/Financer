service: financer-expense-service

frameworkVersion: '3'

provider:
  name: aws
  runtime: nodejs20.x
  region: ${opt:region, 'us-east-1'}
  stage: ${opt:stage, 'local'}
  environment:
    POSTGRES_HOST: ${env:POSTGRES_HOST, 'localhost'}
    POSTGRES_PORT: ${env:POSTGRES_PORT, '5432'}
    POSTGRES_DB: ${env:POSTGRES_DB, 'financer'}
    POSTGRES_USER: ${env:POSTGRES_USER, 'financer'}
    POSTGRES_PASSWORD: ${env:POSTGRES_PASSWORD, 'financer_local'}
    REDIS_HOST: ${env:REDIS_HOST, 'localhost'}
    REDIS_PORT: ${env:REDIS_PORT, '6379'}
    JWT_SECRET: ${env:JWT_SECRET, 'dev_secret'}

plugins:
  - serverless-plugin-typescript
  - serverless-offline

custom:
  serverless-offline:
    httpPort: 3002
    lambdaPort: 0
    noPrependStageInUrl: true

functions:
  health:
    handler: src/handlers/handler.health
    events:
      - http:
          method: GET
          path: /health
          cors: true

  listExpenses:
    handler: src/handlers/handler.listExpenses
    events:
      - http:
          method: GET
          path: /expenses
          cors: true

  createExpense:
    handler: src/handlers/handler.createExpense
    events:
      - http:
          method: POST
          path: /expenses
          cors: true

  updateExpense:
    handler: src/handlers/handler.updateExpense
    events:
      - http:
          method: PUT
          path: /expenses/{id}
          cors: true

  deleteExpense:
    handler: src/handlers/handler.deleteExpense
    events:
      - http:
          method: DELETE
          path: /expenses/{id}
          cors: true

  listCategories:
    handler: src/handlers/handler.listCategories
    events:
      - http:
          method: GET
          path: /categories
          cors: true

  createCategory:
    handler: src/handlers/handler.createCategory
    events:
      - http:
          method: POST
          path: /categories
          cors: true

  updateCategory:
    handler: src/handlers/handler.updateCategory
    events:
      - http:
          method: PUT
          path: /categories/{id}
          cors: true

  deleteCategory:
    handler: src/handlers/handler.deleteCategory
    events:
      - http:
          method: DELETE
          path: /categories/{id}
          cors: true
