# =============================================================================
# Financer — Local Development Services
#
# Usage:
#   docker compose up -d          Start all services
#   docker compose down           Stop all services
#   docker compose logs -f        Follow logs
#   docker compose ps             Check service status
#
# Management UIs:
#   RabbitMQ: http://localhost:15672  (guest / guest)
# =============================================================================

networks:
  financer-network:
    driver: bridge

volumes:
  postgres-data:
    driver: local
  redis-data:
    driver: local
  rabbitmq-data:
    driver: local

services:
  # ---------------------------------------------------------------------------
  # PostgreSQL 16 with pgvector extension
  # ---------------------------------------------------------------------------
  postgres:
    image: pgvector/pgvector:pg16
    container_name: financer-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-financer}
      POSTGRES_USER: ${POSTGRES_USER:-financer}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-financer_local}
    ports:
      - '5432:5432'
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./docker-init:/docker-entrypoint-initdb.d:ro
    networks:
      - financer-network
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U $${POSTGRES_USER:-financer} -d $${POSTGRES_DB:-financer}']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ---------------------------------------------------------------------------
  # Redis 7 — Dashboard cache & LLM rate limiting
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: financer-redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redis-data:/data
    networks:
      - financer-network
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
    # AOF disabled for dev (cache-only use case). Enable for prod if rate-limit state matters.
    command: redis-server --appendonly no --save ""

  # ---------------------------------------------------------------------------
  # RabbitMQ 3 — LLM async job queue
  # Management UI: http://localhost:15672 (guest/guest)
  # ---------------------------------------------------------------------------
  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: financer-rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASS:-guest}
    ports:
      - '5672:5672'    # AMQP
      - '15672:15672'  # Management UI
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    networks:
      - financer-network
    healthcheck:
      test: ['CMD', 'rabbitmq-diagnostics', 'ping']
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 20s
